<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>job discovery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #ffffff;
            color: #000000;
            padding: 24px;
            line-height: 1.6;
        }

        h1 {
            font-family: 'Space Mono', monospace;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: lowercase;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
        }

        .filter-indicator {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            padding: 8px 12px;
            background: #f5f5f5;
            border-left: 3px solid #ff7a1a;
            margin-bottom: 32px;
        }

        .filter-label {
            color: #666;
        }

        .filter-value {
            color: #000;
            font-weight: 400;
        }

        .stats {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
        }

        .stat {
            padding: 8px 16px;
            border: 1px solid #000;
        }

        .stat-label {
            color: #666;
        }

        .stat-value {
            font-weight: 700;
            margin-left: 8px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid #000;
        }

        .tab {
            padding: 8px 16px;
            border: none;
            background: none;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            cursor: pointer;
            border-top: 2px solid transparent;
            border-left: 2px solid transparent;
            border-right: 2px solid transparent;
            text-transform: lowercase;
        }

        .tab.active {
            border-top: 2px solid #ff7a1a;
            border-left: 2px solid #ff7a1a;
            border-right: 2px solid #ff7a1a;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .jobs-grid {
            display: grid;
            gap: 16px;
        }

        .job-card {
            border: 2px solid #000;
            padding: 16px;
            position: relative;
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .job-title {
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .job-company {
            font-size: 14px;
            color: #666;
        }

        .status-badge {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            padding: 4px 8px;
            border: 1px solid #000;
            text-transform: uppercase;
        }

        .status-badge.active {
            background: #ff7a1a;
            color: #fff;
            border-color: #ff7a1a;
        }

        .job-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 8px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .detail-item {
            display: flex;
            gap: 8px;
        }

        .detail-label {
            color: #666;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
        }

        .detail-value {
            font-weight: 600;
        }

        .job-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            padding: 8px 16px;
            border: 2px solid #000;
            background: #fff;
            cursor: pointer;
            text-transform: lowercase;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #000;
            color: #fff;
        }

        .btn-primary {
            background: #ff7a1a;
            border-color: #ff7a1a;
            color: #fff;
        }

        .btn-primary:hover {
            background: #e56a0a;
            border-color: #e56a0a;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #666;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
        }

        a {
            color: #ff7a1a;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>job discovery</h1>
    <div class="subtitle">curated opportunities · $200k+ · verified active</div>
    
    <div class="filter-indicator">
        <span class="filter-label">📍 location filter:</span>
        <span class="filter-value">remote (us) · seattle/wa (in-office or hybrid)</span>
    </div>
    
    <div style="margin-bottom: 24px;">
        <button onclick="exportJobDecisions()" class="btn" style="font-size: 11px; padding: 6px 12px;">
            💾 export decisions (for sync)
        </button>
    </div>

    <div class="stats">
        <div class="stat">
            <span class="stat-label">new</span>
            <span class="stat-value" id="stat-new">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">interested</span>
            <span class="stat-value" id="stat-interested">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">archived</span>
            <span class="stat-value" id="stat-archived">0</span>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="new">new</button>
        <button class="tab" data-tab="interested">interested</button>
        <button class="tab" data-tab="archived">archived</button>
    </div>

    <div class="tab-content active" id="tab-new">
        <div class="jobs-grid" id="jobs-new"></div>
    </div>

    <div class="tab-content" id="tab-interested">
        <div class="jobs-grid" id="jobs-interested"></div>
    </div>

    <div class="tab-content" id="tab-archived">
        <div class="jobs-grid" id="jobs-archived"></div>
    </div>

    <script src="jobs-data.js?v=20260315f"></script>
    <script src="app.js?v=20260315f"></script>
</body>
</html>
