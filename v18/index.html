<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hivemind — Hexagonal Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="ambient-glow" id="glow"></div>

  <nav class="nav">
    <div class="nav-brand">HIVE<span class="accent">MIND</span></div>
    <div class="nav-links">
      <a href="#" class="nav-link active" data-nav="hero">Home</a>
      <a href="#" class="nav-link" data-nav="about">About</a>
      <a href="#" class="nav-link" data-nav="work">Work</a>
      <a href="#" class="nav-link" data-nav="skills">Skills</a>
      <a href="#" class="nav-link" data-nav="contact">Contact</a>
    </div>
  </nav>

  <!-- Background hex grid -->
  <svg class="bg-grid" aria-hidden="true">
    <defs>
      <pattern id="hexP" width="56" height="100" patternUnits="userSpaceOnUse" patternTransform="scale(1.5)">
        <path d="M28 2L54 18V50L28 66L2 50V18Z" fill="none" stroke="rgba(0,229,208,0.03)" stroke-width="0.5"/>
        <path d="M28 34L54 50V82L28 98L2 82V50Z" fill="none" stroke="rgba(0,229,208,0.03)" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#hexP)"/>
  </svg>

  <!-- 3D Scene -->
  <div class="scene" id="scene">
    <div class="scene-inner" id="sceneInner">

      <!-- Each section is a hex-grid parallax layer -->
      <!-- JS will populate hex positions and handle parallax -->

      <!-- ═══ HERO ═══ -->
      <div class="hex-grid" id="grid-hero" data-section="hero" data-parallax="0.02">
        <div class="hex-grid-inner" id="inner-hero"></div>
      </div>

      <!-- ═══ ABOUT ═══ -->
      <div class="section-label" data-section="about">
        <div class="section-label-mono">About</div>
      </div>
      <div class="hex-grid" id="grid-about" data-parallax="0.03">
        <div class="hex-grid-inner" id="inner-about"></div>
      </div>

      <!-- ═══ WORK ═══ -->
      <div class="section-label" data-section="work">
        <div class="section-label-mono">Selected Work</div>
        <h2 class="section-title">The <span class="accent">Honeycomb.</span></h2>
      </div>
      <div class="hex-grid" id="grid-work" data-parallax="0.04">
        <div class="hex-grid-inner" id="inner-work"></div>
      </div>

      <!-- ═══ SKILLS ═══ -->
      <div class="section-label" data-section="skills">
        <div class="section-label-mono">Capabilities</div>
        <h2 class="section-title">Skill <span class="accent">Cells.</span></h2>
      </div>
      <div class="hex-grid" id="grid-skills" data-parallax="0.05">
        <div class="hex-grid-inner" id="inner-skills"></div>
      </div>

      <!-- ═══ CONTACT ═══ -->
      <div class="section-label" data-section="contact">
        <div class="section-label-mono">Get in Touch</div>
      </div>
      <div class="hex-grid" id="grid-contact" data-parallax="0.03">
        <div class="hex-grid-inner" id="inner-contact"></div>
      </div>

    </div>
  </div>

  <footer class="footer">
    <span>&copy; 2026 — Design Prototype</span>
    <span class="accent">Hivemind v18</span>
  </footer>

<script>
/* ═══════════════════════════════════════════
   HIVEMIND ENGINE — 3D Hex Grid + Parallax
   ═══════════════════════════════════════════ */

(() => {
  'use strict';

  /* ── CONFIG ── */
  const HEX_BASE = Math.min(Math.max(window.innerWidth * 0.11, 100), 160);
  const HEX_H = HEX_BASE * 1.1547;
  const GAP = 5;

  /* ── HEX POSITION CALCULATOR ── */
  function hexPos(col, row, scale = 1) {
    const w = HEX_BASE * scale;
    const h = w * 1.1547;
    const x = col * (w + GAP) + (row % 2 !== 0 ? (w + GAP) / 2 : 0);
    const y = row * (h * 0.75 + GAP);
    return { x, y, w, h };
  }

  /* ── CREATE HEX ELEMENT ── */
  function createHex(pos, content, classes = '', depth = 'near') {
    const el = document.createElement('div');
    el.className = `hex ${classes}`.trim();
    el.style.cssText = `
      --x: ${pos.x}px; --y: ${pos.y}px;
      left: ${pos.x}px; top: ${pos.y}px;
      width: ${pos.w}px; height: ${pos.h}px;
    `;
    if (depth !== 'near') el.dataset.depth = depth;
    el.innerHTML = `<div class="hex-inner"><div class="hex-content">${content}</div></div>`;

    // Reveal animation
    el.classList.add('reveal-hex');
    return el;
  }

  /* ── GRID DIMENSIONS (auto-fit to actual hex positions) ── */
  function fitGrid(inner) {
    let maxR = 0, maxB = 0;
    inner.querySelectorAll('.hex').forEach(el => {
      const l = parseFloat(el.style.left) || 0;
      const t = parseFloat(el.style.top) || 0;
      const w = parseFloat(el.style.width) || 0;
      const h = parseFloat(el.style.height) || 0;
      if (l + w > maxR) maxR = l + w;
      if (t + h > maxB) maxB = t + h;
    });
    inner.style.width = (maxR + 10) + 'px';
    inner.style.height = (maxB + 10) + 'px';
  }

  /* ═══════════════════════════════════
     BUILD EACH SECTION
     ═══════════════════════════════════ */

  /* ── HERO ── */
  const heroInner = document.getElementById('inner-hero');
  const heroHexes = [
    // Decorative background hexes (depth: far)
    { col: 0, row: 0, s: 0.6, depth: 'far', cls: 'hex-empty' },
    { col: 4, row: 0, s: 0.5, depth: 'far', cls: 'hex-empty' },
    { col: 5, row: 1, s: 0.45, depth: 'far', cls: 'hex-empty' },
    { col: 0, row: 2, s: 0.5, depth: 'far', cls: 'hex-empty' },
    // Mid-depth stat hexes
    { col: 0, row: 1, s: 0.85, depth: 'mid', cls: 'hex-interactive hex-glow-teal',
      html: '<div class="hex-stat">16+</div><div class="hex-stat-label">Years</div>' },
    { col: 4, row: 1, s: 0.85, depth: 'mid', cls: 'hex-interactive hex-glow-amber',
      html: '<div class="hex-stat">5</div><div class="hex-stat-label">Studios</div>' },
    { col: 1, row: 2, s: 0.85, depth: 'mid', cls: 'hex-interactive hex-glow-teal',
      html: '<div class="hex-stat">10+</div><div class="hex-stat-label">Products</div>' },
    { col: 3, row: 2, s: 0.85, depth: 'mid', cls: 'hex-interactive hex-glow-amber',
      html: '<div class="hex-stat">6+</div><div class="hex-stat-label">Leading</div>' },
    // Central hero hex (foreground)
    { col: 1.5, row: 0, s: 2.2, depth: 'near', cls: 'hex-interactive hex-glow-teal',
      html: `<div class="hex-label">Portfolio 2026</div>
             <h1 class="hex-title">Creative<br>Director</h1>
             <p class="hex-body">Building systems that think.</p>` },
  ];
  heroHexes.forEach(h => {
    heroInner.appendChild(createHex(hexPos(h.col, h.row, h.s), h.html || '', h.cls, h.depth));
  });
  fitGrid(heroInner);

  /* ── ABOUT ── */
  const aboutInner = document.getElementById('inner-about');
  const aboutHexes = [
    { col: 0, row: 0, s: 0.5, depth: 'far', cls: 'hex-empty' },
    { col: 4, row: 0, s: 0.45, depth: 'far', cls: 'hex-empty' },
    { col: 0.5, row: 0, s: 1.7, cls: 'hex-interactive hex-glow-teal',
      html: `<div class="hex-label">About</div>
             <h2 class="hex-heading">The best design<br>is invisible.</h2>
             <p class="hex-body">It earns trust by making the right choice obvious — then gets out of the way.</p>` },
    { col: 3.2, row: 0, s: 1.3, cls: 'hex-interactive hex-glow-amber',
      html: `<div class="hex-label">Philosophy</div>
             <h3 class="hex-subhead">Build for players,<br>not designers.</h3>` },
    // Principles row
    { col: 0, row: 1.6, s: 0.85, cls: 'hex-interactive',
      html: '<div class="hex-num">01</div><div class="hex-principle-text">Systems Over Scale</div>' },
    { col: 1, row: 1.6, s: 0.85, cls: 'hex-interactive',
      html: '<div class="hex-num">02</div><div class="hex-principle-text">Validate First</div>' },
    { col: 2, row: 1.6, s: 0.85, cls: 'hex-interactive',
      html: '<div class="hex-num">03</div><div class="hex-principle-text">Execute &gt; Ideate</div>' },
    { col: 3, row: 1.6, s: 0.85, cls: 'hex-interactive',
      html: '<div class="hex-num">04</div><div class="hex-principle-text">Select, Don\'t Invent</div>' },
    { col: 4, row: 1.6, s: 0.85, cls: 'hex-interactive',
      html: '<div class="hex-num">05</div><div class="hex-principle-text">Emergent Play</div>' },
    // Second principles row (offset)
    { col: 0.5, row: 2.4, s: 0.85, depth: 'mid', cls: 'hex-interactive',
      html: '<div class="hex-num">06</div><div class="hex-principle-text">Sustainable Systems</div>' },
    { col: 1.5, row: 2.4, s: 0.85, depth: 'mid', cls: 'hex-interactive',
      html: '<div class="hex-num">07</div><div class="hex-principle-text">Strong POV</div>' },
    { col: 2.5, row: 2.4, s: 0.85, depth: 'mid', cls: 'hex-interactive',
      html: '<div class="hex-num">08</div><div class="hex-principle-text">Clarity = Kindness</div>' },
    { col: 3.8, row: 2.4, s: 0.5, depth: 'far', cls: 'hex-empty' },
  ];
  aboutHexes.forEach(h => {
    aboutInner.appendChild(createHex(hexPos(h.col, h.row, h.s), h.html || '', h.cls, h.depth || 'near'));
  });
  fitGrid(aboutInner);

  /* ── WORK ── */
  const workInner = document.getElementById('inner-work');
  const workHexes = [
    { col: 0, row: 0, s: 0.5, depth: 'far', cls: 'hex-empty' },
    { col: 0.5, row: 0, s: 1.8, cls: 'hex-interactive hex-glow-teal',
      html: `<div class="hex-label">2022 &rarr; Current</div>
             <h3 class="hex-heading">Project Alpha</h3>
             <p class="hex-project-role">Creative Director</p>
             <div class="hex-tags"><span class="hex-tag">Leadership</span><span class="hex-tag">Systems</span></div>` },
    { col: 3.3, row: 0, s: 1.3, cls: 'hex-interactive hex-glow-amber',
      html: `<div class="hex-label">2019 &rarr; 2022</div>
             <h3 class="hex-subhead">Project Beta</h3>
             <p class="hex-project-role">Design Director</p>
             <div class="hex-tags"><span class="hex-tag">UX</span><span class="hex-tag">Open World</span></div>` },
    { col: 4.8, row: 0, s: 0.5, depth: 'far', cls: 'hex-empty' },
    { col: 0, row: 1.6, s: 1.3, cls: 'hex-interactive hex-glow-rose',
      html: `<div class="hex-label">2015 &rarr; 2019</div>
             <h3 class="hex-subhead">Project Gamma</h3>
             <p class="hex-project-role">Lead Designer</p>
             <div class="hex-tags"><span class="hex-tag">Combat</span><span class="hex-tag">ARPG</span></div>` },
    { col: 2, row: 1.6, s: 1, cls: 'hex-interactive hex-glow-amber',
      html: `<div class="hex-label">2013 &rarr; 2015</div>
             <h3 class="hex-subhead">Project Delta</h3>
             <p class="hex-project-role">Game Designer</p>
             <div class="hex-metric">+12%</div>` },
    { col: 3.2, row: 1.6, s: 1, cls: 'hex-interactive',
      html: `<div class="hex-label">2009 &rarr; 2013</div>
             <h3 class="hex-subhead">Project Echo</h3>
             <p class="hex-project-role">Systems Designer</p>
             <div class="hex-tags"><span class="hex-tag">RTS</span><span class="hex-tag">MOBA</span></div>` },
    { col: 4.3, row: 1.6, s: 0.5, depth: 'far', cls: 'hex-empty' },
  ];
  workHexes.forEach(h => {
    workInner.appendChild(createHex(hexPos(h.col, h.row, h.s), h.html || '', h.cls, h.depth || 'near'));
  });
  fitGrid(workInner);

  /* ── SKILLS ── */
  const skillsInner = document.getElementById('inner-skills');
  const skillNames = {
    design: ['Systems Design', 'UX Design', 'Progression', 'Combat', 'Open World'],
    lead: ['Direction', 'Mentorship', 'Product', 'Roadmap'],
    tools: ['Unreal', 'Unity', 'Figma', 'Jira']
  };
  const skillHexes = [
    // Category headers
    { col: 0.5, row: 0, s: 1.2, cls: 'hex-interactive hex-glow-teal',
      html: '<div class="hex-skill-cat">Design</div>' },
    { col: 2.2, row: 0, s: 1.2, cls: 'hex-interactive hex-glow-amber',
      html: '<div class="hex-skill-cat">Leadership</div>' },
    { col: 3.9, row: 0, s: 1.2, cls: 'hex-interactive hex-glow-rose',
      html: '<div class="hex-skill-cat">Tools</div>' },
    // Design skills
    ...skillNames.design.map((n, i) => ({
      col: i * 0.95, row: 1.3, s: 0.8, cls: 'hex-interactive',
      html: `<span class="hex-skill-name">${n}</span>`
    })),
    // Leadership skills
    ...skillNames.lead.map((n, i) => ({
      col: 0.5 + i * 0.95, row: 2.2, s: 0.8, depth: 'mid', cls: 'hex-interactive',
      html: `<span class="hex-skill-name">${n}</span>`
    })),
    // Tools
    ...skillNames.tools.map((n, i) => ({
      col: 1 + i * 0.95, row: 3.1, s: 0.8, cls: 'hex-interactive',
      html: `<span class="hex-skill-name">${n}</span>`
    })),
    // Decorative
    { col: 4.8, row: 1.3, s: 0.4, depth: 'far', cls: 'hex-empty' },
    { col: 0, row: 3.1, s: 0.4, depth: 'far', cls: 'hex-empty' },
  ];
  skillHexes.forEach(h => {
    skillsInner.appendChild(createHex(hexPos(h.col, h.row, h.s), h.html || '', h.cls, h.depth || 'near'));
  });
  fitGrid(skillsInner);

  /* ── CONTACT ── */
  const contactInner = document.getElementById('inner-contact');
  const contactHexes = [
    { col: 0, row: 0, s: 0.5, depth: 'far', cls: 'hex-empty' },
    { col: 1, row: 0, s: 2.2, cls: 'hex-interactive hex-glow-teal',
      html: `<div class="hex-label">Connect</div>
             <h2 class="hex-heading">Let's build<br>something.</h2>
             <div class="contact-links">
               <a href="#" class="contact-link">&#10003; Email</a>
               <a href="#" class="contact-link">&#8599; LinkedIn</a>
               <a href="#" class="contact-link">&#8595; Resume</a>
             </div>` },
    { col: 4, row: 0, s: 0.5, depth: 'far', cls: 'hex-empty' },
    { col: 0.5, row: 1, s: 0.45, depth: 'far', cls: 'hex-empty' },
    { col: 3.8, row: 1, s: 0.5, depth: 'far', cls: 'hex-empty' },
  ];
  contactHexes.forEach(h => {
    contactInner.appendChild(createHex(hexPos(h.col, h.row, h.s), h.html || '', h.cls, h.depth || 'near'));
  });
  fitGrid(contactInner);


  /* ═══════════════════════════════════
     INTERACTION ENGINE
     ═══════════════════════════════════ */

  let mouseX = 0.5, mouseY = 0.5;
  let scrollY = 0;
  const sceneInner = document.getElementById('sceneInner');
  const glowEl = document.getElementById('glow');

  /* ── MOUSE TRACKING ── */
  document.addEventListener('mousemove', e => {
    mouseX = e.clientX / window.innerWidth;
    mouseY = e.clientY / window.innerHeight;
    glowEl.style.left = e.clientX + 'px';
    glowEl.style.top = e.clientY + 'px';
  });

  /* ── 3D SCENE TILT (mouse-driven) ── */
  function updateSceneTilt() {
    const rx = (mouseY - 0.5) * -3;  // subtle vertical tilt
    const ry = (mouseX - 0.5) * 4;   // horizontal tilt
    sceneInner.style.transform =
      `rotateX(${rx}deg) rotateY(${ry}deg)`;
  }

  /* ── PARALLAX ON SCROLL ── */
  const grids = document.querySelectorAll('.hex-grid');

  function updateParallax() {
    scrollY = window.scrollY;
    grids.forEach(grid => {
      const factor = parseFloat(grid.dataset.parallax) || 0;
      const rect = grid.getBoundingClientRect();
      const center = rect.top + rect.height / 2;
      const offset = (center - window.innerHeight / 2) * factor;
      grid.style.transform = `translateZ(${offset}px)`;
    });
  }

  /* ── HEX HOVER 3D TILT + SPOTLIGHT ── */
  document.querySelectorAll('.hex-interactive').forEach(hex => {
    const inner = hex.querySelector('.hex-inner');

    hex.addEventListener('mousemove', e => {
      const rect = hex.getBoundingClientRect();
      const nx = (e.clientX - rect.left) / rect.width;
      const ny = (e.clientY - rect.top) / rect.height;
      const cx = nx - 0.5;
      const cy = ny - 0.5;

      // 3D tilt within the hover scale
      const baseX = parseFloat(hex.style.getPropertyValue('--x')) || 0;
      const baseY = parseFloat(hex.style.getPropertyValue('--y')) || 0;
      hex.style.transform =
        `translate3d(${baseX}px, ${baseY}px, 0)
         translateZ(60px)
         rotateY(${cx * 16}deg) rotateX(${cy * -16}deg)
         scale(1.22)`;

      // Spotlight follows cursor inside hex
      inner.style.setProperty('--spotlight-x', (nx * 100) + '%');
      inner.style.setProperty('--spotlight-y', (ny * 100) + '%');
    });

    hex.addEventListener('mouseleave', () => {
      hex.style.transform = '';
      inner.style.setProperty('--spotlight-x', '50%');
      inner.style.setProperty('--spotlight-y', '50%');
    });
  });

  /* ── SCROLL REVEAL ── */
  function revealOnScroll() {
    const vh = window.innerHeight;
    document.querySelectorAll('.reveal-hex:not(.visible)').forEach(el => {
      const rect = el.getBoundingClientRect();
      // Generous trigger zone: 200px below viewport to 200px above
      if (rect.top < vh + 200 && rect.bottom > -200) {
        el.classList.add('visible');
      }
    });
  }

  /* ── NAV ── */
  const navLinks = document.querySelectorAll('.nav-link');
  const sectionEls = document.querySelectorAll('[data-section]');

  navLinks.forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();
      const target = document.querySelector(`[data-section="${link.dataset.nav}"]`);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });

  function updateNav() {
    const sy = window.scrollY + window.innerHeight * 0.35;
    let current = '';
    sectionEls.forEach(el => {
      if (el.offsetTop <= sy) current = el.dataset.section;
    });
    navLinks.forEach(l => {
      l.classList.toggle('active', l.dataset.nav === current);
    });
  }

  /* ── ANIMATION LOOP ── */
  let ticking = false;
  function onFrame() {
    updateSceneTilt();
    updateParallax();
    revealOnScroll();
    updateNav();
    ticking = false;
  }

  function requestTick() {
    if (!ticking) {
      ticking = true;
      requestAnimationFrame(onFrame);
    }
  }

  window.addEventListener('scroll', requestTick, { passive: true });
  window.addEventListener('mousemove', requestTick, { passive: true });

  // Initial
  requestAnimationFrame(() => {
    onFrame();
    // Stagger reveal entrance
    document.querySelectorAll('.reveal-hex').forEach((el, i) => {
      el.style.transitionDelay = (i * 0.04) + 's';
    });
    revealOnScroll();
    // Fallback: force-reveal everything after 2s in case observer missed
    setTimeout(() => {
      document.querySelectorAll('.reveal-hex:not(.visible)').forEach(el => {
        el.classList.add('visible');
      });
    }, 2500);
  });

})();
</script>
</body>
</html>
